<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insanesec — Fortnite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="fortnite-grid-page">
  <div class="noise" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>
  <header class="site-header">
    <nav class="nav-sym" aria-label="Main">
      <div class="nav-cluster nav-cluster--left">
        <a href="index.html#shop" class="nav-link">Shop</a>
        <a href="index.html#community" class="nav-link">Community</a>
        <a href="index.html#community-videos" class="nav-link">Videos</a>
      </div>
      <a href="index.html#top" class="brand" aria-current="page">
        <span class="brand-inner"><span class="brand-i">I</span>nsanesec</span>
      </a>
      <div class="nav-cluster nav-cluster--right">
        <a href="index.html#community-invites" class="nav-link">Join</a>
        <a href="index.html#support" class="nav-link">Support</a>
        <a href="index.html#shop" class="nav-link">Cart</a>
      </div>
    </nav>
  </header>
  <main class="shop">
    <div class="shop-toolbar">
      <a class="btn-back" href="index.html#shop">← All categories</a>
      <p class="shop-context">Fortnite</p>
    </div>
    <div class="section-head">
      <h2>Fortnite</h2>
      <p class="section-sub">🎮 Fortnite Cheats, Arcane, ignite &amp; Torix Private Cheat</p>
    </div>
    <div class="product-grid">
      <article class="product-card" data-product-id="fn-battle-bundle" data-base-price="34" data-cta-label="More Details" data-cta-href="fortnitetorix.html" data-include-lifetime="true" data-day-price="5" data-week-price="15" data-month-price="30" data-lifetime-price="80">
        <div class="product-visual"><img src="fortnitetorix.png" alt="Torix Fortnite" class="product-img" /></div>
        <div class="product-body">
          <h3>Torix: Fortnite Private Cheat</h3>
          <p class="product-price">$34.00 <span class="product-price-suffix">base</span></p>
        </div>
      </article>
      <article class="product-card" data-product-id="fn-creator-pack" data-base-price="10" data-cta-label="More Details" data-cta-href="fortnitearcane.html" data-include-lifetime="false" data-day-price="10" data-week-price="30" data-month-price="50">
        <div class="product-visual"><img src="fortnitearcane.png" alt="Arcane Fortnite" class="product-img" /></div>
        <div class="product-body">
          <h3>Arcane: Fortnite Cheat</h3>
          <p class="product-price">$10.00 <span class="product-price-suffix">base</span></p>
        </div>
      </article>
      <article class="product-card" data-product-id="fn-ignite" data-base-price="15" data-cta-label="More Details" data-cta-href="fortniteignite.html" data-include-lifetime="true" data-day-price="15" data-three-day-price="20" data-week-price="35" data-month-price="60" data-lifetime-price="350">
        <div class="product-visual"><img src="fortniteignite.png" alt="Ignite Fortnite" class="product-img" /></div>
        <div class="product-body">
          <h3>Ignite: Fortnite Cheat</h3>
          <p class="product-price">$15.00 <span class="product-price-suffix">base</span></p>
        </div>
      </article>
    </div>
  </main>
<footer class="site-footer">
  <div class="footer-sym">
    <span>© Insanesec</span>
    <span class="footer-dot">◆</span>
    <span>2026</span>
  </div>
</footer>
  <script src="product-page-cart.js"></script>
</body>
</html>
